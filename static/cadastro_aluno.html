                    <li><a href="login.html">Login</a></li>
                </ul>
            </nav>
        </header>
        <main class="pagina-cadastro">
    <section class="formulario-container">
        <h2>Cadastro de Aluno</h2>
        <p>Preencha os dados abaixo para registrar o estudante no sistema.</p>

        <form id="formCadastro">
            <div class="grupo-input">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" placeholder="Ex: João Silva" required>
            </div>

            <div class="linha-form">
                <div class="grupo-input">
                    <label for="nascimento">Data de Nascimento</label>
                    <input type="date" id="nascimento" name="nascimento" required>
                </div>
                <div class="grupo-input">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>
                </div>
            </div>

            <div class="linha-form">
                <div class="grupo-input">
                    <label for="turma">Turma</label>
                    <select id="turma" name="turma" required>
                        <option value="">Selecione...</option>
                        <option value="ds-2026">Dev. Sistemas - 2026</option>
                        <option value="adm-2026">Administração - 2026</option>
                    </select>
                </div>
                <div class="grupo-input">
                    <label for="professor">Professor Responsável</label>
                    <input type="text" id="professor" name="professor" placeholder="Nome do docente" required>
                </div>
            </div>

            <div class="grupo-input">
                <label for="endereco">Endereço Residencial</label>
                <input type="text" id="endereco" name="endereco" placeholder="Rua, número, bairro..." required>
            </div>

            <div class="grupo-input">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="aluno@escola.com.br" required>
            </div>

            <div id="campo-responsavel" class="grupo-input hidden">
                <label for="responsavel">Nome do Responsável (Menor de 18 anos)</label>
                <input type="text" id="responsavel" name="responsavel" placeholder="Nome completo do pai, mãe ou tutor">
            </div>

            <button type="submit" class="btn-cadastrar">Finalizar Cadastro</button>
        </form>
    </section>
</main>
