<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EduChamada</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
     <header>
            <div class="logo">
                <a href="index.html">
                    <h1>EduChamada</h1>
                </a>
            </div>

            <nav>
                <ul>
                    <li><a href="index.html">Início</a></li>
                    <li><a href="chamada.html">Realizar Chamada</a></li>
                    <li><a href="cadastro.html">Cadastro</a></li>
                    <li><a href="login.html">Login</a></li>
                </ul>
            </nav>
        </header>

    <main class="login-container">
        <img src="imagens/quadro.png" alt="Quadro Escolar" class="hero-image">

        <div class="login-box">

            <div class="login-topo">
                <h1>EduChamada</h1>
                <p>Sistema de gestão escolar</p>
            </div>

            <form class="formulario">

                <label>
                    Email
                    <input type="email" placeholder="seu@email.com" required>
                </label>

                <label>
                    Senha
                    <input type="password" placeholder="....." required>
                </label>

                <button type="submit" class="botao botao-principal">
                    Entrar
                </button>

            </form>

            <p class="login-extra">
                Não tem conta? <a href="cadastro.html">Cadastre-se</a>
            </p>

        </div>

    </main>
    <footer>
    <nav>
        <a href="#sobre">Sobre</a>
        <a href="#contato">Contato</a>
        
        <span>| &copy; 2026 EduChamada - Gestão Inteligente |</span>
        
        <a href="chamada.html">Turmas</a>
        <a href="cadastro_aluno.html">Cadastro de Aluno</a>
    </nav>
    </footer>
    <script src="app.js"></script>

</body>
</html>
