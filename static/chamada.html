<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chamada - EduChamada</title>
    <link rel="stylesheet" href="/chamada.css">
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <main class="pagina">
        <header>
            <div class="logo">
                <a href="/index.html">
                    <h1>EduChamada</h1>
                </a>
            </div>

            <nav>
                <ul>
                    <li><a href="/index.html">Início</a></li>
                    <li><a href="/chamada.html">Realizar Chamada</a></li>
                    <li><a href="/cadastro.html">Cadastro</a></li>
                    <li><a href="/login.html">Login</a></li>
                </ul>
            </nav>
        </header>

        <section class="grade">
            <article class="cartao">
                <h2>Configurar chamada</h2>

                <div class="formulario">
                    <label>
                        Data
                        <input type="date" id="data-chamada">
                    </label>

                    <label>
                        Turma
                        <select id="filtro-turma">
                            <option value="">Todas as turmas</option>
                        </select>
                    </label>

                    <button type="button" class="botao botao-secundario">
                        Atualizar lista
                    </button>
                </div>
            </article>

            <article class="cartao">
                <h2>Resumo</h2>

                <div class="resumo">
                    <div class="resumo-item resumo-presente">
                        <span>Presentes</span>
                        <strong id="presente">0</strong>
                    </div>

                    <div class="resumo-item resumo-falta">
                        <span>Faltas</span>
                        <strong id="falta">0</strong>
                    </div>

                    <div class="resumo-item resumo-atraso">
                        <span>Atrasos</span>
                        <strong id="atraso">0</strong>
                    </div>
                </div>
            </article>
        </section>

        <section class="cartao cartao-tabela">
            <h2>Lista de alunos</h2>

            <div class="tabela-area">
                <table>
                    <thead>
                        <tr>
                            <th>Aluno</th>
                            <th>Turma</th>
                            <th>Status</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr>
                            <td colspan="3" style="text-align:center;">
                                Carregando alunos...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <br>

            <button type="button" class="botao botao-principal">
                Salvar chamada
            </button>
        </section>
    </main>

    <footer>
        <nav>
            <a href="/index.html#sobre">Sobre</a>
            <a href="/index.html#contato">Contato</a>

            <span>| &copy; 2026 EduChamada - Gestão Inteligente |</span>

            <a href="/registro.html">Editar</a>
            <a href="/chamada.html">Turmas</a>
            <a href="/cadastro_aluno.html">Cadastro de Aluno</a>
        </nav>
    </footer>
    <script src="/app.js"></script>
</body>

</html>
